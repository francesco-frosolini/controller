name: Training CI

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: simulation:dev

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        load: false
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
        cache-to: type=gha,mode=max

  train-m1:
    name: Train M1
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        load: true
        tags: ${{ env.IMAGE_TAG }}
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
    - run: |
        mkdir -p m1-artifacts
        docker run --rm \
          -e UID=$(id -u) -e GID=$(id -g) \
          -e NEUROCONTROLLER_M1_ARTIFACTS_DIR=/sim/controller/m1-artifacts \
          -w /sim/controller \
          -v ${{ github.workspace }}:/sim/controller \
          ${{ env.IMAGE_TAG }} pytest tests/training/test_train_m1.py -v -s
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: m1-artifacts
        path: m1-artifacts/
        retention-days: 1

  train-planner:
    name: Train Planner
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        load: true
        tags: ${{ env.IMAGE_TAG }}
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
    - run: |
        mkdir -p planner-artifacts
        docker run --rm \
          -e UID=$(id -u) -e GID=$(id -g) \
          -e NEUROCONTROLLER_PLANNER_ARTIFACTS_DIR=/sim/controller/planner-artifacts \
          -w /sim/controller \
          -v ${{ github.workspace }}:/sim/controller \
          ${{ env.IMAGE_TAG }} pytest tests/training/test_train_planner.py -v -s
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: planner-artifacts
        path: planner-artifacts/
        retention-days: 1

  run-trial:
    name: 1-Trial Run
    needs: [ train-m1, train-planner ]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        load: true
        tags: ${{ env.IMAGE_TAG }}
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: m1-artifacts
        path: m1-artifacts/
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: planner-artifacts
        path: planner-artifacts/
    - run: |
        mkdir -p results
        docker run --rm \
          -e UID=$(id -u) -e GID=$(id -g) \
          -e NEUROCONTROLLER_M1_ARTIFACTS_DIR=/sim/controller/m1-artifacts \
          -e NEUROCONTROLLER_PLANNER_ARTIFACTS_DIR=/sim/controller/planner-artifacts \
          -w /sim/controller \
          -v ${{ github.workspace }}:/sim/controller \
          -v ${{ github.workspace }}/results:/sim/controller/runs \
          ${{ env.IMAGE_TAG }} pytest tests/training/test_run_trial.py -v -s
    - name: Show logs
      if: always()
      run: |
        for f in results/*/logs/*.log; do
          echo "::group::$(basename $f)"
          cat "$f"
          echo "::endgroup::"
        done 2>/dev/null || echo "No log files found"
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: trial-results
        path: |
          results/
          !results/**/data/
        retention-days: 21
