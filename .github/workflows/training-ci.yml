name: Training CI

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: simulation:dev

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        load: false
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
        cache-to: type=gha,mode=max

  train-m1:
    name: Train M1
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        load: true
        tags: ${{ env.IMAGE_TAG }}
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
    - run: |
        mkdir -p m1-artifacts
        docker run --rm \
          -e UID=$(id -u) -e GID=$(id -g) \
          -e NEUROCONTROLLER_M1_ARTIFACTS_DIR=/sim/controller/m1-artifacts \
          -w /sim/controller \
          -v ${{ github.workspace }}:/sim/controller \
          ${{ env.IMAGE_TAG }} bash -c "
            uv pip install --no-deps --force-reinstall -e ./submodules/motor_cortex_eprop \
            && pytest tests/training/test_train_m1.py -v -s
          "
    - uses: actions/upload-artifact@v4
      with:
        name: m1-artifacts
        path: m1-artifacts/
        retention-days: 1

  train-planner:
    name: Train Planner
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        load: true
        tags: ${{ env.IMAGE_TAG }}
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
    - run: |
        mkdir -p planner-artifacts
        docker run --rm \
          -e UID=$(id -u) -e GID=$(id -g) \
          -e NEUROCONTROLLER_PLANNER_ARTIFACTS_DIR=/sim/controller/planner-artifacts \
          -w /sim/controller \
          -v ${{ github.workspace }}:/sim/controller \
          ${{ env.IMAGE_TAG }} bash -c "
            uv pip install --no-deps --force-reinstall -e ./submodules/pfc_planner \
            && pytest tests/training/test_train_planner.py -v -s
          "
    - uses: actions/upload-artifact@v4
      with:
        name: planner-artifacts
        path: planner-artifacts/
        retention-days: 1

  run-trial:
    name: 1-Trial Run
    needs: [ train-m1, train-planner ]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        load: true
        tags: ${{ env.IMAGE_TAG }}
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
    - uses: actions/download-artifact@v4
      with:
        name: m1-artifacts
        path: m1-artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: planner-artifacts
        path: planner-artifacts/
    - run: |
        mkdir -p results
        docker run --rm \
          -e UID=$(id -u) -e GID=$(id -g) \
          -e NEUROCONTROLLER_M1_ARTIFACTS_DIR=/sim/controller/m1-artifacts \
          -e NEUROCONTROLLER_PLANNER_ARTIFACTS_DIR=/sim/controller/planner-artifacts \
          -w /sim/controller \
          -v ${{ github.workspace }}:/sim/controller \
          -v ${{ github.workspace }}/results:/sim/controller/runs \
          ${{ env.IMAGE_TAG }} pytest tests/training/test_run_trial.py -v -s
    - name: Show logs
      if: always()
      run: |
        for f in results/*/logs/*.log; do
          echo "::group::$(basename $f)"
          cat "$f"
          echo "::endgroup::"
        done 2>/dev/null || echo "No log files found"
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trial-results
        path: |
          results/
          !results/**/data/
        retention-days: 21
