name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, converted_to_draft]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: simulation:dev

jobs:
  lint:
    name: Black Formatter
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: "3.10"
    - run: uv venv
    - run: uv pip install --group dev
    - run: uv run --no-project -- black --check --exclude '/(submodules|deprecated|.venv)/' .

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        push: ${{ github.event_name == 'push' }}
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
        cache-to: ${{ github.event_name == 'push' && format('type=registry,ref={0}/{1}:cache,mode=max', env.REGISTRY, env.IMAGE_NAME) || 'type=gha,mode=max' }}

  trial:
    name: 1-Trial Run
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Rebuild from cache and load into local docker daemon
    - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: docker/Dockerfile
        target: dev
        load: true
        tags: ${{ env.IMAGE_TAG }}
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          type=gha
    - run: |
        mkdir -p results
        docker run --rm \
          -e UID=$(id -u) -e GID=$(id -g) \
          -w /sim/controller \
          -v ${{ github.workspace }}:/sim/controller \
          -v ${{ github.workspace }}/results:/sim/controller/runs \
          ${{ env.IMAGE_TAG }} run-trials 1
    - name: Show logs
      if: always()
      run: |
        for f in results/*/logs/*.log; do
          echo "::group::$(basename $f)"
          cat "$f"
          echo "::endgroup::"
        done 2>/dev/null || echo "No log files found"
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: trial-results
        path: |
          results/
          !results/**/data/
        retention-days: 21
