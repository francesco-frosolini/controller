name: No plasticity (inverse)
storage:
  root: /sim/controller/fake_storage.hdf5
simulations:
  basal_activity:
    connection_models:
      parallel_fiber_to_purkinje_plus:
        synapses:
        - model: stdp_synapse_sinexp
          weight: 0.14
          delay: 5
          Aplus: 9e-6
          Aminus: -5e-4
          receptor_type: 1
      parallel_fiber_to_stellate:
        synapses:
        - model: stdp_synapse_alpha
          weight: 0.08
          delay: 5
          Aplus: 0
          Aminus: 0
          receptor_type: 1
      parallel_fiber_to_basket:
        synapses:
        - model: stdp_synapse_alpha
          weight: 0.06
          delay: 5
          Aplus: 0
          Aminus: 0
          receptor_type: 1
      parallel_fiber_to_purkinje_minus:
        synapses:
        - model: stdp_synapse_sinexp
          weight: 0.14
          delay: 5
          Aplus: 9e-6
          Aminus: -5e-4
          receptor_type: 1

$import:
  ref: ./microzones_complete_nest.yaml#/
  values:
  - simulations
  - network
  - partitions
  - cell_types
  - placement
  - connectivity
  - storage
